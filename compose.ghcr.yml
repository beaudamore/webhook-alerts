services:
  webhook-alerts:
    image: ${WEBHOOK_ALERTS_IMAGE:-ghcr.io/beaudamore/webhook-alerts:latest}
    container_name: webhook-alerts
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
      GMAIL_TO: ${GMAIL_TO:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
